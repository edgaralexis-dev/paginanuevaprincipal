name: CI y despliegue

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Subdominio propio en la raíz del sitio: variable PAGES_BASE=/ (Settings → Variables).
          # Si no defines PAGES_BASE, se usa /nombre-del-repo/ (URL default de GitHub Pages).
          BASE_PATH: ${{ vars.PAGES_BASE || format('/{0}/', github.event.repository.name) }}
          VITE_URL_API: ${{ vars.VITE_URL_API }}
          VITE_PRIMETIX_WEB_ORIGIN: ${{ vars.VITE_PRIMETIX_WEB_ORIGIN }}
          VITE_CODIGO_PAIS: ${{ vars.VITE_CODIGO_PAIS }}
          VITE_USE_HASH_ROUTER: ${{ vars.VITE_USE_HASH_ROUTER }}
        run: npm run build

      - name: Subir artefacto (Pages) — solo rama principal / no PR
        if: github.event_name != 'pull_request'
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Subir artefacto (PR)
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist
          if-no-files-found: error

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Desplegar a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
