# Despliegue S3 + CloudFront solo para ESTE repo (nombres NP_* = “nueva principal”, no chocan con el portal).
#
# Variables (Settings → Actions → Variables). Usa bucket + distribución DEDICADOS a esta app:
#   NP_AWS_S3_BUCKET_DEV          — bucket dev (ej. primetix-paginanuevaprincipal-dev)
#   NP_AWS_CLOUDFRONT_ID_DEV      — ID distribución CloudFront de ese bucket
#   NP_AWS_S3_BUCKET_PROD       — bucket prod (cuando exista)
#   NP_AWS_CLOUDFRONT_ID_PROD   — ID CloudFront prod
#   NP_AWS_REGION                 — opcional; default us-east-1
#   VITE_API_DEV_URL, VITE_API_PROD_URL (o VITE_URL_API como respaldo)
#
# Opcional: NP_S3_PREFIX — carpeta dentro del bucket (sin / al inicio/fin).
#
# Secretos: AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY
# Opcional: SKIP_CLOUDFRONT_INVALIDATION=true si IAM no permite CreateInvalidation.

name: Desplegar AWS (S3 + CloudFront)

on:
  workflow_dispatch:
    inputs:
      target:
        description: Entorno
        type: choice
        options: [dev, prod]
        default: dev
  push:
    branches: [main]

concurrency:
  group: aws-deploy-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy-aws:
    if: github.event_name == 'workflow_dispatch' || vars.AWS_DEPLOY_DEV_ON_PUSH == 'true'
    runs-on: ubuntu-latest
    environment: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'prod' && 'production' || 'development' }}
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Entorno de despliegue
        id: cfg
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            T="${{ github.event.inputs.target }}"
          else
            T="dev"
          fi
          echo "target=$T" >> "$GITHUB_OUTPUT"
          PREFIX_RAW="${{ vars.NP_S3_PREFIX }}"
          PREFIX_RAW="${PREFIX_RAW#/}"
          PREFIX_RAW="${PREFIX_RAW%/}"
          echo "prefix=$PREFIX_RAW" >> "$GITHUB_OUTPUT"
          if [ "$T" = "prod" ]; then
            echo "bucket=${{ vars.NP_AWS_S3_BUCKET_PROD }}" >> "$GITHUB_OUTPUT"
            echo "cf=${{ vars.NP_AWS_CLOUDFRONT_ID_PROD }}" >> "$GITHUB_OUTPUT"
            API="${{ vars.VITE_API_PROD_URL }}"
            if [ -z "$API" ]; then API="${{ vars.VITE_URL_API }}"; fi
            echo "api=$API" >> "$GITHUB_OUTPUT"
          else
            echo "bucket=${{ vars.NP_AWS_S3_BUCKET_DEV }}" >> "$GITHUB_OUTPUT"
            echo "cf=${{ vars.NP_AWS_CLOUDFRONT_ID_DEV }}" >> "$GITHUB_OUTPUT"
            API="${{ vars.VITE_API_DEV_URL }}"
            if [ -z "$API" ]; then API="${{ vars.VITE_URL_API }}"; fi
            echo "api=$API" >> "$GITHUB_OUTPUT"
          fi

      - name: Comprobar configuración
        run: |
          test -n "${{ steps.cfg.outputs.bucket }}" || { echo "Falta variable del bucket"; exit 1; }
          test -n "${{ steps.cfg.outputs.cf }}" || { echo "Falta NP_AWS_CLOUDFRONT_ID_DEV o NP_AWS_CLOUDFRONT_ID_PROD"; exit 1; }
          test -n "${{ steps.cfg.outputs.api }}" || { echo "Falta URL del API: variable VITE_API_DEV_URL (dev) o VITE_API_PROD_URL (prod), o VITE_URL_API como respaldo"; exit 1; }

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          BASE_PATH: ${{ steps.cfg.outputs.prefix != '' && format('/{0}/', steps.cfg.outputs.prefix) || '/' }}
          VITE_URL_API: ${{ steps.cfg.outputs.api }}
          VITE_PRIMETIX_WEB_ORIGIN: ${{ vars.VITE_PRIMETIX_WEB_ORIGIN }}
          VITE_CODIGO_PAIS: ${{ vars.VITE_CODIGO_PAIS }}
          VITE_USE_HASH_ROUTER: ${{ vars.VITE_USE_HASH_ROUTER }}
        run: npm run build

      - name: Credenciales AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.NP_AWS_REGION != '' && vars.NP_AWS_REGION || 'us-east-1' }}

      - name: Sincronizar S3
        run: |
          BUCKET="${{ steps.cfg.outputs.bucket }}"
          P="${{ steps.cfg.outputs.prefix }}"
          if [ -n "$P" ]; then
            DEST="s3://${BUCKET}/${P}/"
          else
            DEST="s3://${BUCKET}/"
          fi
          echo "Destino: $DEST"
          aws s3 sync dist/ "$DEST" --delete

      # Evita que index.html quede con max-age alto en S3: si apunta a un JS viejo, el navegador nunca pide el nuevo chunk.
      - name: index.html y 404.html con Cache-Control corto
        run: |
          BUCKET="${{ steps.cfg.outputs.bucket }}"
          P="${{ steps.cfg.outputs.prefix }}"
          [ -n "$P" ] && PREFIX="${P}/" || PREFIX=""
          BASE="s3://${BUCKET}/${PREFIX}"
          aws s3 cp dist/index.html "${BASE}index.html" \
            --cache-control "no-cache, no-store, must-revalidate" \
            --content-type "text/html; charset=utf-8"
          if [ -f dist/404.html ]; then
            aws s3 cp dist/404.html "${BASE}404.html" \
              --cache-control "no-cache, no-store, must-revalidate" \
              --content-type "text/html; charset=utf-8"
          fi

      - name: Bundle referenciado por index.html (comprueba en el navegador)
        run: |
          echo "Referencia JS en este despliegue:"
          grep -oE 'src="assets/index-[^"]+\.js"' dist/index.html || true

      - name: Invalidar CloudFront
        if: vars.SKIP_CLOUDFRONT_INVALIDATION != 'true'
        run: |
          DIST="${{ steps.cfg.outputs.cf }}"
          P="${{ steps.cfg.outputs.prefix }}"
          if [ -n "$P" ]; then
            PATHS="/${P}/*"
          else
            PATHS="/*"
          fi
          aws cloudfront create-invalidation --distribution-id "$DIST" --paths "$PATHS"

      - name: Invalidación CloudFront omitida
        if: vars.SKIP_CLOUDFRONT_INVALIDATION == 'true'
        run: echo "SKIP_CLOUDFRONT_INVALIDATION=true — no se invalidó CDN. Añade IAM o quita esta variable."
